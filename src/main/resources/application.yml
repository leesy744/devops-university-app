server:
  port: 8080
spring:
  application:
    name: department-service
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    # url: jdbc:mariadb://localhost:3306/web
    # url: jdbc:mariadb://172.18.0.2:3306/web
    # url: jdbc:mariadb://mariadb:3306/web
    url: jdbc:mariadb://mariadb-service:3306/web
    username: beyond
    password: beyond
  # Redis 연결을 위한 설정
  data:
    redis:
      # host: localhost
      # host: 172.18.0.3
      # host: redis
      # username: default
      host: redis-service
      username: beyond
      password: beyond
      port: 6379
mybatis:
  type-aliases-package: com.beyond.university.*.model.vo
  mapper-locations:
    - classpath:mappers/**/*.xml
  configuration:
    jdbc-type-for-null: NULL
springdoc:
  swagger-ui:
    operations-sorter: method
  paths-to-match:
    - /api/v1/**
jwt:
  issuer: https://accounts.beyond.com
  secret: h1o2n3g4g5i6l7d8o9n0g;h1o2n3g4g5i6l7d8o9n0g
management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true